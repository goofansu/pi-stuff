<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Call Graph Diff</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #0f1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px 10px;
      border-bottom: 1px solid #21262d;
    }
    .header-left { min-width: 0; }
    h1 {
      font-size: 13px; font-weight: 600; color: #e6edf3;
      letter-spacing: .06em; text-transform: uppercase;
      display: inline; margin-right: 10px;
    }
    .branch-line { display: inline; font-size: 11px; color: #6e7681; }
    .branch-line span { color: #79c0ff; }
    .summary { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .pill {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      background: #161b22; border: 1px solid #30363d;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-added     { background: #3fb950; }
    .dot-removed   { background: #f85149; }
    .dot-rewired   { background: #e3b341; }
    .dot-unchanged { background: #8b949e; }
    .pill-val { color: #e6edf3; margin-right: 1px; }

    /* ── Legend toggle ── */
    .legend-wrap { position: relative; flex-shrink: 0; }
    .legend-btn {
      display: flex; align-items: center; gap: 5px;
      background: #161b22; border: 1px solid #30363d;
      color: #8b949e; font-family: inherit; font-size: 11px;
      padding: 4px 10px; border-radius: 6px;
      cursor: pointer; white-space: nowrap;
    }
    .legend-btn:hover { border-color: #6e7681; color: #c9d1d9; }
    .legend-panel {
      display: none;
      position: absolute; top: calc(100% + 6px); right: 0;
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 8px; padding: 10px 14px;
      font-size: 11px; color: #8b949e; line-height: 1.9;
      z-index: 50; white-space: nowrap;
    }
    .legend-panel.open { display: block; }
    .legend-section { color: #c9d1d9; font-weight: 600; font-size: 11px; margin-bottom: 4px; }
    .legend-section + .legend-section,
    .legend-spacer { margin-top: 8px; }
    .legend-row  { display: flex; align-items: center; gap: 8px; }
    .legend-line { width: 28px; height: 2px; flex-shrink: 0; }
    .legend-node { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    /* ── Graph ── */
    #graph-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      min-height: 0;
    }
    svg#graph { display: block; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed; pointer-events: none;
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 8px 12px;
      font-size: 11px; color: #c9d1d9;
      max-width: 340px; line-height: 1.6;
      display: none; z-index: 100;
    }
    #tooltip .tt-title { color: #e6edf3; font-weight: 600; margin-bottom: 3px; }
    #tooltip .tt-file  { color: #8b949e; font-size: 10px; }
    #tooltip .tt-badge {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .badge-added     { background:#1a3a22; color:#3fb950; border:1px solid #3fb950; }
    .badge-removed   { background:#3a1a1a; color:#f85149; border:1px solid #f85149; }
    .badge-rewired   { background:#3a2e10; color:#e3b341; border:1px solid #e3b341; }
    .badge-unchanged { background:#1c2128; color:#8b949e; border:1px solid #30363d; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Call Graph Diff</h1>
    <span class="branch-line" id="branch-line"></span>
    <div class="summary" id="summary"></div>
  </div>

  <div class="legend-wrap">
    <button class="legend-btn" id="legend-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="3" cy="6" r="2.5" fill="#3fb950"/>
        <circle cx="9" cy="6" r="2.5" fill="#30363d" stroke="#6e7681" stroke-width="1"/>
      </svg>
      Legend <span id="legend-arrow">▾</span>
    </button>
    <div class="legend-panel" id="legend-panel">
      <div class="legend-section">NODES</div>
      <div class="legend-row"><div class="legend-node" style="background:#1a3a22;border:1.5px solid #3fb950;"></div> added</div>
      <div class="legend-row"><div class="legend-node" style="background:#3a1a1a;border:1.5px solid #f85149;"></div> removed</div>
      <div class="legend-row"><div class="legend-node" style="background:#3a2e10;border:1.5px solid #e3b341;"></div> rewired</div>
      <div class="legend-row"><div class="legend-node" style="background:#1c2128;border:1.5px solid #30363d;"></div> unchanged</div>
      <div class="legend-spacer legend-section">EDGES</div>
      <div class="legend-row"><div class="legend-line" style="background:#3fb950;"></div> added</div>
      <div class="legend-row"><div class="legend-line" style="background:#f85149;border-top:2px dashed #f85149;height:0;"></div> removed</div>
      <div class="legend-row"><div class="legend-line" style="background:#6e7681;"></div> both</div>
      <div class="legend-spacer legend-section">MARKERS</div>
      <div class="legend-row">
        <svg width="28" height="14" style="flex-shrink:0">
          <rect x="1" y="1" width="26" height="12" rx="2" fill="none" stroke="#79c0ff" stroke-width="1" stroke-dasharray="3,2"/>
        </svg>
        entry point
      </div>
    </div>
  </div>
</header>

<div id="graph-wrap">
  <svg id="graph"></svg>
</div>
<div id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ─── Legend toggle ────────────────────────────────────────────────────────────
const legendBtn   = document.getElementById('legend-btn');
const legendPanel = document.getElementById('legend-panel');
const legendArrow = document.getElementById('legend-arrow');
legendBtn.addEventListener('click', () => {
  const open = legendPanel.classList.toggle('open');
  legendArrow.textContent = open ? '▴' : '▾';
});
document.addEventListener('click', e => {
  if (!legendBtn.contains(e.target) && !legendPanel.contains(e.target)) {
    legendPanel.classList.remove('open');
    legendArrow.textContent = '▾';
  }
});

// ─── Data (injected by render.sh) ────────────────────────────────────────────
const graphData = /* GRAPH_DATA_PLACEHOLDER */;

// ─── Branch line ─────────────────────────────────────────────────────────────
const meta = graphData.meta || {};
if (meta.featureBranch || meta.baseBranch) {
  document.getElementById('branch-line').innerHTML =
    `<span>${meta.featureBranch || '?'}</span> &nbsp;←&nbsp; <span>${meta.baseBranch || '?'}</span>`;
  document.title = `Call Graph Diff — ${meta.featureBranch || ''}`;
}

// ─── Summary pills ───────────────────────────────────────────────────────────
document.getElementById('summary').innerHTML = [
  { key: 'files_changed', label: 'files changed', cls: 'unchanged' },
  { key: 'added',         label: 'added',         cls: 'added'     },
  { key: 'removed',       label: 'removed',       cls: 'removed'   },
  { key: 'rewired',       label: 'rewired',       cls: 'rewired'   },
  { key: 'unchanged',     label: 'unchanged',     cls: 'unchanged' },
].map(({ key, label, cls }) =>
  `<div class="pill"><div class="dot dot-${cls}"></div><span class="pill-val">${graphData.summary[key]}</span>${label}</div>`
).join('');

// ─── Derive groups deterministically from file (first-appearance order) ───────
const fileOrder   = [];   // fileOrder[group] = file string
const fileToGroup = {};
graphData.nodes.forEach(n => {
  if (fileToGroup[n.file] == null) {
    fileToGroup[n.file] = fileOrder.length;
    fileOrder.push(n.file);
  }
  n.group = fileToGroup[n.file];
});
const numGroups  = fileOrder.length;
const fileBaseName = file => (file || '').split('/').pop() || file || '';
const methodCall = id => (id || '').split('::').pop() || id;
const groupLabel = g => fileBaseName(fileOrder[g]) || `group ${g}`;

// ─── Color maps ──────────────────────────────────────────────────────────────
const nodeColors = {
  added:     { bg: '#1a3a22', border: '#3fb950', text: '#3fb950' },
  removed:   { bg: '#3a1a1a', border: '#f85149', text: '#f85149' },
  rewired:   { bg: '#3a2e10', border: '#e3b341', text: '#e3b341' },
  unchanged: { bg: '#1c2128', border: '#30363d', text: '#8b949e' },
};
const edgeColors   = { added: '#3fb950', removed: '#f85149', both: '#484f58' };
const groupPalette = ['#1f6feb','#9e6a03','#8957e5','#2ea043','#f78166','#58a6ff'];
const groupColor   = g => groupPalette[g % groupPalette.length];

// ─── Entry points (in-degree 0) ──────────────────────────────────────────────
const inDegree = {};
graphData.nodes.forEach(n => { inDegree[n.id] = 0; });
graphData.edges.forEach(e => { inDegree[e.dst] = (inDegree[e.dst] || 0) + 1; });
const isEntry = id => !inDegree[id];

// ─── Swim-lane layout constants ───────────────────────────────────────────────
const COLUMN_W = 360;
const NODE_W   = 310;
const NODE_H   = 34;
const CORNER   = 5;
const HEADER_H = 54;
const SLOT_H   = 66;
const PAD_L    = 16;
const ARROW    = 13;

// ─── Assign slot indices within each group (in node-array order) ─────────────
const groupSlotCount = {};
graphData.nodes.forEach(n => {
  n._slot = groupSlotCount[n.group] ?? 0;
  groupSlotCount[n.group] = n._slot + 1;
});

const colCenterX = g => PAD_L + g * COLUMN_W + COLUMN_W / 2;

graphData.nodes.forEach(n => {
  n.x = colCenterX(n.group);
  n.y = HEADER_H + n._slot * SLOT_H + SLOT_H / 2;
});

// ─── Canvas dimensions ───────────────────────────────────────────────────────
const wrap   = document.getElementById('graph-wrap');
const availH = wrap.clientHeight || (window.innerHeight - 90);
const maxSlot = d3.max(Object.values(groupSlotCount));
const totalW  = PAD_L * 2 + numGroups * COLUMN_W;
const totalH  = Math.max(HEADER_H + maxSlot * SLOT_H + 60, availH);

// ─── SVG setup ───────────────────────────────────────────────────────────────
const svg = d3.select('#graph')
  .attr('width', totalW)
  .attr('height', totalH);

['added','removed','both'].forEach(s => {
  svg.append('defs').append('marker')
    .attr('id', `arrow-${s}`)
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 9).attr('refY', 0)
    .attr('markerWidth', 7).attr('markerHeight', 7)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', edgeColors[s]);
});

// ─── Layers ──────────────────────────────────────────────────────────────────
const laneLayer = svg.append('g');
const edgeLayer = svg.append('g');
const nodeLayer = svg.append('g');

// ─── Swim-lane column backgrounds ────────────────────────────────────────────
d3.range(numGroups).forEach(g => {
  const cx = colCenterX(g);
  const lx = cx - COLUMN_W / 2 + 4;
  const lw = COLUMN_W - 8;

  laneLayer.append('rect')
    .attr('x', lx).attr('y', 0)
    .attr('width', lw).attr('height', totalH)
    .attr('fill', '#8b949e').attr('opacity', 0.03).attr('rx', 8);

  laneLayer.append('rect')
    .attr('x', lx).attr('y', 6)
    .attr('width', lw).attr('height', HEADER_H - 10)
    .attr('fill', '#21262d').attr('opacity', 1).attr('rx', 6);

  laneLayer.append('text')
    .attr('x', cx).attr('y', HEADER_H / 2 + 4)
    .attr('text-anchor', 'middle')
    .attr('fill', '#8b949e').attr('opacity', 1)
    .attr('font-size', '11px').attr('font-family', "'SF Mono',monospace")
    .attr('font-weight', '600')
    .text(groupLabel(g));

  if (g > 0) {
    laneLayer.append('line')
      .attr('x1', cx - COLUMN_W / 2).attr('y1', 0)
      .attr('x2', cx - COLUMN_W / 2).attr('y2', totalH)
      .attr('stroke', '#21262d').attr('stroke-width', 1);
  }
});

// ─── Edges ───────────────────────────────────────────────────────────────────
const nodeById = Object.fromEntries(graphData.nodes.map(n => [n.id, n]));
const links = graphData.edges.map(e => ({
  ...e, source: nodeById[e.src], target: nodeById[e.dst],
}));

function edgePath(d) {
  const s = d.source, t = d.target;
  if (!s || !t) return '';

  if (s.group === t.group) {
    // Same column: vertical S-curve, bumps to the right
    const goDown = t.y >= s.y;
    const sx = s.x,  sy = goDown ? s.y + NODE_H / 2 + 2  : s.y - NODE_H / 2 - 2;
    const tx = t.x,  ty = goDown ? t.y - NODE_H / 2 - ARROW : t.y + NODE_H / 2 + ARROW;
    const bump = COLUMN_W * 0.28;
    return `M${sx},${sy} C${sx + bump},${sy} ${tx + bump},${ty} ${tx},${ty}`;
  }

  if (t.group > s.group) {
    // Forward: exit right edge → enter left edge
    const sx = s.x + NODE_W / 2 + 2,    sy = s.y;
    const tx = t.x - NODE_W / 2 - ARROW, ty = t.y;
    const mid = (sx + tx) / 2;
    return `M${sx},${sy} C${mid},${sy} ${mid},${ty} ${tx},${ty}`;
  }

  // Backward: route below the graph
  const belowY = totalH - 18;
  const sx = s.x - NODE_W / 2 - 2,    sy = s.y;
  const tx = t.x + NODE_W / 2 + ARROW, ty = t.y;
  return `M${sx},${sy} C${sx - 50},${sy} ${sx - 50},${belowY} ${(sx + tx) / 2},${belowY} C${tx + 50},${belowY} ${tx + 50},${ty} ${tx},${ty}`;
}

const edgeSel = edgeLayer.selectAll('path')
  .data(links).join('path')
  .attr('fill', 'none')
  .attr('stroke', d => edgeColors[d.status])
  .attr('stroke-width', d => d.status === 'removed' ? 1.5 : 1.8)
  .attr('stroke-dasharray', d => d.status === 'removed' ? '5,3' : null)
  .attr('marker-end', d => `url(#arrow-${d.status})`)
  .attr('opacity', 0.85)
  .attr('d', edgePath);

// ─── Nodes ───────────────────────────────────────────────────────────────────
const nodeSel = nodeLayer.selectAll('g.node')
  .data(graphData.nodes).join('g')
  .attr('class', 'node').style('cursor', 'grab')
  .attr('transform', d => `translate(${d.x - NODE_W / 2},${d.y - NODE_H / 2})`);

nodeSel.filter(d => isEntry(d.id))
  .append('rect')
  .attr('x', -4).attr('y', -4)
  .attr('width', NODE_W + 8).attr('height', NODE_H + 8)
  .attr('rx', CORNER + 3).attr('fill', 'none')
  .attr('stroke', '#79c0ff').attr('stroke-width', 1)
  .attr('stroke-dasharray', '4,3').attr('opacity', 0.5);

nodeSel.append('rect')
  .attr('width', NODE_W).attr('height', NODE_H)
  .attr('rx', CORNER).attr('fill', d => nodeColors[d.status].bg)
  .attr('stroke', d => nodeColors[d.status].border).attr('stroke-width', 1.5);

nodeSel.append('rect')
  .attr('width', 3).attr('height', NODE_H - 2 * CORNER)
  .attr('x', 0).attr('y', CORNER).attr('rx', 1.5)
  .attr('fill', d => nodeColors[d.status].border).attr('opacity', 0.9);

nodeSel.append('text')
  .attr('x', 12).attr('y', NODE_H / 2 + 1)
  .attr('dominant-baseline', 'middle')
  .attr('fill', d => nodeColors[d.status].text)
  .attr('font-size', '11px').attr('font-family', "'SF Mono','Fira Code',monospace")
  .text(d => methodCall(d.id));

nodeSel.filter(d => isEntry(d.id))
  .append('text')
  .attr('x', NODE_W / 2).attr('y', -9)
  .attr('text-anchor', 'middle')
  .attr('font-size', '9px').attr('font-family', "'SF Mono',monospace")
  .attr('fill', '#79c0ff').attr('letter-spacing', '0.06em').attr('opacity', 0.75)
  .text('ENTRY');

// ─── Highlight helpers ───────────────────────────────────────────────────────
function highlightNode(d) {
  const connectedNodes = new Set([d]);
  links.forEach(l => {
    if (l.source === d) connectedNodes.add(l.target);
    if (l.target === d) connectedNodes.add(l.source);
  });

  edgeSel
    .attr('opacity', l => (l.source === d || l.target === d) ? 1.0 : 0.06)
    .attr('stroke-width', l => {
      if (l.source === d || l.target === d) return l.status === 'removed' ? 2.5 : 3;
      return l.status === 'removed' ? 1.5 : 1.8;
    });

  nodeSel.attr('opacity', n => connectedNodes.has(n) ? 1 : 0.15);
}

function highlightEdge(d) {
  edgeSel
    .attr('opacity', l => l === d ? 1.0 : 0.06)
    .attr('stroke-width', l => l === d
      ? (l.status === 'removed' ? 2.5 : 3)
      : (l.status === 'removed' ? 1.5 : 1.8)
    );
  nodeSel.attr('opacity', n => (n === d.source || n === d.target) ? 1 : 0.15);
}

let _clearTimer = null;
function scheduleClear() {
  _clearTimer = setTimeout(() => { clearHighlight(); }, 120);
}
function cancelClear() {
  if (_clearTimer) { clearTimeout(_clearTimer); _clearTimer = null; }
}

function clearHighlight() {
  edgeSel
    .attr('opacity', 0.85)
    .attr('stroke-width', l => l.status === 'removed' ? 1.5 : 1.8);
  nodeSel.attr('opacity', 1);
}

// ─── Tooltips ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

nodeSel
  .on('mouseenter', (evt, d) => { cancelClear(); highlightNode(d); })
  .on('mousemove', (evt, d) => {
    tooltip.style.display = 'block';
    tooltip.style.left = (evt.clientX + 14) + 'px';
    tooltip.style.top  = (evt.clientY - 10) + 'px';
    const out = links.filter(l => l.source === d).map(l => `${methodCall(l.target.id)} <span style="color:${edgeColors[l.status]}">[${l.status}]</span>`);
    const inc = links.filter(l => l.target === d).map(l => `${methodCall(l.source.id)} <span style="color:${edgeColors[l.status]}">[${l.status}]</span>`);
    const entryBadge = isEntry(d.id) ? `<span style="color:#79c0ff;font-size:9px;margin-left:6px;">ENTRY</span>` : '';
    tooltip.innerHTML = `
      <div class="tt-title">${methodCall(d.id)}${entryBadge}</div>
      <span class="tt-badge badge-${d.status}">${d.status}</span>
      <div class="tt-file">${d.file}</div>
      ${out.length ? `<div style="margin-top:6px;color:#6e7681;font-size:10px;">calls →<br><span style="color:#c9d1d9">${out.join('<br>')}</span></div>` : ''}
      ${inc.length ? `<div style="margin-top:4px;color:#6e7681;font-size:10px;">called by ←<br><span style="color:#c9d1d9">${inc.join('<br>')}</span></div>` : ''}
    `;
  })
  .on('mouseleave', () => { scheduleClear(); tooltip.style.display = 'none'; });

edgeSel
  .on('mousemove', (evt, d) => {
    tooltip.style.display = 'block';
    tooltip.style.left = (evt.clientX + 14) + 'px';
    tooltip.style.top  = (evt.clientY - 10) + 'px';
    const c = { added:'#3fb950', removed:'#f85149', both:'#8b949e' };
    tooltip.innerHTML = `
      <div style="color:${c[d.status]};font-weight:600;">${d.status.toUpperCase()}</div>
      <div style="margin-top:4px;color:#6e7681;">${methodCall(d.src)} <span style="color:#e6edf3">→</span> ${methodCall(d.dst)}</div>
    `;
  })
  .on('mouseleave', () => { tooltip.style.display = 'none'; });

// ─── Drag ─────────────────────────────────────────────────────────────────────
nodeSel.call(
  d3.drag()
    .on('start', function() { d3.select(this).style('cursor', 'grabbing'); })
    .on('drag', function(evt, d) {
      d.x = Math.max(NODE_W / 2 + 4, Math.min(totalW - NODE_W / 2 - 4, evt.x));
      d.y = Math.max(NODE_H / 2 + 4, Math.min(totalH - NODE_H / 2 - 4, evt.y));
      d3.select(this).attr('transform', `translate(${d.x - NODE_W / 2},${d.y - NODE_H / 2})`);
      edgeSel.attr('d', edgePath);
    })
    .on('end', function() { d3.select(this).style('cursor', 'grab'); })
);
</script>
</body>
</html>
